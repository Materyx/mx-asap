# Tests on PRs (base: main, dev, prod) and on pushes to main, dev, prod.
# PyInstaller + GitHub Release (assets + auto notes) only on push to `prod` (bump [project].version in pyproject.toml in that merge).
# Actions use the Node.js 24 runtime (see actions/checkout, setup-python, upload/download-artifact changelogs).

name: Test and build binaries

on:
  pull_request:
    branches: [main, dev, prod]
  push:
    branches: [main, dev, prod]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}"
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-build.txt

      - name: Install package and pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: mx-asap-win
          - os: ubuntu-22.04
            artifact_name: mx-asap-lin
          - os: macos-latest
            artifact_name: mx-asap-mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-build.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python -m pip install -e ".[dev]"

      - name: PyInstaller
        run: pyinstaller --noconfirm packaging/mx-asap.spec

      - name: Package Windows (exe + README)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          Copy-Item dist/mx-asap.exe pkg/
          Copy-Item packaging/release-notes/README-Windows.txt pkg/README.txt
          Compress-Archive -Path "pkg\*" -DestinationPath mx-asap-windows.zip -Force

      - name: Package Linux (binary + README)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p pkg
          cp dist/mx-asap pkg/
          cp packaging/release-notes/README-Linux.txt pkg/README.txt
          chmod +x pkg/mx-asap
          (cd pkg && zip -r ../mx-asap-linux.zip .)

      - name: Package macOS (app + README)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p pkg
          cp -R dist/mx-asap.app pkg/
          cp packaging/release-notes/README-macOS.txt pkg/README.txt
          (cd pkg && zip -ry ../mx-asap-macos.zip .)

      - name: Upload Windows bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: mx-asap-windows.zip

      - name: Upload Linux bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: mx-asap-linux.zip

      - name: Upload macOS bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: mx-asap-macos.zip

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download Windows bundle
        uses: actions/download-artifact@v7
        with:
          name: mx-asap-win
          path: release-assets

      - name: Download Linux bundle
        uses: actions/download-artifact@v7
        with:
          name: mx-asap-lin
          path: release-assets

      - name: Download macOS bundle
        uses: actions/download-artifact@v7
        with:
          name: mx-asap-mac
          path: release-assets

      - name: Verify bundles
        run: |
          set -euo pipefail
          ls -la release-assets
          test -f release-assets/mx-asap-windows.zip
          test -f release-assets/mx-asap-linux.zip
          test -f release-assets/mx-asap-macos.zip

      - name: Create release from [project] version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="$(python3 -c "import tomllib, pathlib; print(tomllib.load(pathlib.Path('pyproject.toml').read_bytes())['project']['version'])")"
          TAG="v${V}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists. Bump the version in pyproject.toml and merge the change into prod in a new PR before releasing again."
            exit 1
          fi
          gh release create "${TAG}" \
            --title "mx-asap ${TAG}" \
            --target "${GITHUB_SHA}" \
            --generate-notes \
            "release-assets/mx-asap-windows.zip" \
            "release-assets/mx-asap-linux.zip" \
            "release-assets/mx-asap-macos.zip"
